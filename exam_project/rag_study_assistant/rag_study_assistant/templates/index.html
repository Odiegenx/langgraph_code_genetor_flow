<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local RAG Study Assistant</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header>
        <h1>📘 Local RAG Study Assistant</h1>
        <p>Ask questions about your course materials</p>
    </header>

    <main>
        <form id="question-form">
            <textarea id="question-input" placeholder="Enter your question here..." required></textarea>
            <button type="submit">Ask</button>
        </form>

        <div id="status" class="hidden">
            <p>🔍 Searching and generating answer...</p>
        </div>

        <section id="answer-section" class="hidden">
            <h2>Answer</h2>
            <div id="answer-content"></div>

            <h3>Sources</h3>
            <ul id="sources-list"></ul>
        </section>

        <section id="error-message" class="hidden">
            <p>⚠️ Something went wrong. Please try again.</p>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
