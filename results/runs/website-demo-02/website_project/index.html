<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Game Website</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🕹️ Multi-Game Hub</h1>
    </header>

    <!-- Start Screen -->
    <section id="start-screen" class="screen">
      <div class="game-grid">
        <button class="game-card" data-game="snake">🐍 Snake</button>
        <button class="game-card" data-game="tic-tac-toe">⭕❌ Tic Tac Toe</button>
        <button class="game-card" data-game="memory-match">🧠 Memory Match</button>
      </div>
    </section>

    <!-- Game Containers -->
    <section id="game-container" class="screen hidden">
      <div id="game-area"></div>
      <button id="back-button">⬅️ Back to Menu</button>
    </section>
  </div>

  <script src="app.js"></script>
  <script src="games/snake.js"></script>
  <script src="games/tic_tac_toe.js"></script>
  <script src="games/memory_match.js"></script>
</body>
</html>
