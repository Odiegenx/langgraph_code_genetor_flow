<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <h1>Tic Tac Toe</h1>
    <div>
      <p>Current Player: <span id="ttt-current-player">X</span></p>
      <div id="ttt-board" class="grid-board grid-3x3"></div>
      <p id="ttt-result-message"></p>
      <button id="ttt-reset">Reset Game</button>
    </div>
  </main>
  <script src="tictactoe.js"></script>
</body>
</html>
