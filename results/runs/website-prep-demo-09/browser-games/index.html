<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Games Hub</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="game-container">
    <header class="game-header">
      <h1 class="game-title">Browser Games Hub</h1>
    </header>
    <div class="game-card" data-game="snake.html">
      <h2>Snake</h2>
      <p>Classic snake game</p>
    </div>
    <div class="game-card" data-game="tictactoe.html">
      <h2>Tic Tac Toe</h2>
      <p>3-in-a-row game</p>
    </div>
    <div class="game-card" data-game="memory.html">
      <h2>Memory Match</h2>
      <p>Find matching pairs</p>
    </div>
  </div>
  <script src="game-select.js"></script>
</body>
</html>
