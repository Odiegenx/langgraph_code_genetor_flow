<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Games Hub</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Browser Games Hub</h1>
      <p>Select a game to play:</p>
    </header>
    <main>
      <div class="games-grid">
        <a href="snake.html" class="game-card">
          <div class="game-icon">🐍</div>
          <h2>Snake</h2>
          <p>Classic snake game. Guide the snake to eat food and grow.</p>
        </a>
        <a href="tictactoe.html" class="game-card">
          <div class="game-icon">❌⭕</div>
          <h2>Tic Tac Toe</h2>
          <p>Two-player classic. Get three in a row to win.</p>
        </a>
        <a href="memory.html" class="game-card">
          <div class="game-icon">🧠</div>
          <h2>Memory Match</h2>
          <p>Find matching pairs in the least number of moves.</p>
        </a>
      </div>
    </main>
  </div>
</body>
</html>
