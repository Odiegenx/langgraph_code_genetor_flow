<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatGPT Clone</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="chat-container">
    <div id="chat-messages"></div>
    
    <div class="input-area">
      <div id="image-preview" class="preview-container"></div>
      <div class="input-row">
        <button id="image-upload-button" aria-label="Upload Image">📎</button>
        <textarea id="message-input" placeholder="Type your message..." aria-label="Message input"></textarea>
        <button id="send-button" aria-label="Send message">Send</button>
        <button id="settings-button" aria-label="Settings">⚙️</button>
      </div>
    </div>
  </div>

  <div id="settings-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <h2>Settings</h2>
      <label for="api-key-input">OpenAI API Key:</label>
      <input type="password" id="api-key-input" placeholder="Enter your API key">
      <div class="modal-buttons">
        <button id="save-key-button" aria-label="Save API key">Save</button>
        <button id="close-settings" aria-label="Close settings">Close</button>
      </div>
    </div>
  </div>

  <input type="file" id="image-file-input" accept="image/*" style="display: none;">

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/highlight.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
